<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Jugable Mente</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <style>
        :root {
            --bg: #030303;
            --neon: #00ffb3;
            --neon-soft: rgba(0,255,179,0.25);
            --text: #eafff8;
            --card: rgba(0,255,179,0.05);
            --border: rgba(0,255,179,0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        body {
            background: black;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-size: clamp(14px, 1.2vw, 18px);
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 180px;
            max-width: 80%;
            margin-bottom: 16px;
            filter: none;
        }

        header p {
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        a.card {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            padding: 18px;
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        a.card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--neon);
            box-shadow: 0 0 12px var(--neon-soft);
            background: rgba(0, 255, 179, 0.08);
        }

        .title {
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: clamp(0.9rem, 1vw, 1.2rem);
        }

        footer {
            text-align: center;
            margin-top: 26px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        /* 📱 Responsive logo */
        @media (min-width: 768px) {
            .logo {
                width: 260px;
            }
            .container {
                max-width: 820px;
            }

            .grid {
                gap: 16px;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            a.card {
                min-height: 90px;
                padding: 20px;
            }

            .title {
                font-size: 1.05rem;
            }

            header p {
                font-size: 1rem;
            }
        }

        @media (min-width: 1200px) {
            .logo {
                width: 360px;
            }
            .container {
                max-width: 1000px;
            }

            .grid {
                gap: 20px;
                grid-template-columns: repeat(3, 1fr);
            }

            a.card {
                min-height: 110px;
                padding: 24px;
                border-radius: 16px;
            }

            .title {
                font-size: 1.2rem;
                letter-spacing: 0.8px;
            }

            header p {
                font-size: 1.1rem;
            }

            footer {
                font-size: 1.05rem;
            }
        }

    </style>
</head>

<body>
<div class="container">
    <header>
        <img alt="Logo" class="logo" src="img/logo.png" />
        <p>Tu Podcast divulgativo sobre Videojuegos y Psicología en español</p>
        <p>Con Itxel a los mandos e Inforpsico en el micro</p>
    </header>

    <div class="grid">
        <a class="card" href="https://www.ivoox.com/podcast-jugable-mente_sq_f13160639_1.html" target="_blank">
            <div class="title">Ivoox</div>
        </a>
        <a class="card" href="https://open.spotify.com/show/5iHQB3gf4hD3Q1gNKg9RU6" target="_blank">
            <div class="title">Spotify</div>
        </a>
        <a class="card" href="https://www.youtube.com/@jugablemente" target="_blank">
            <div class="title">Youtube</div>
        </a>
        <a class="card" href="https://x.com/jugablemente" target="_blank">
            <div class="title">Twitter</div>
        </a>
        <a class="card" href="https://t.me/+Xi0qWRDfaC82NWY0" target="_blank">
            <div class="title">Telegram</div>
        </a>
        <a class="card" href="https://www.instagram.com/jugablemente" target="_blank">
            <div class="title">Instagram</div>
        </a>
    </div>

    <footer>© Jugable Mente</footer>
</div>
</body>
</html>
